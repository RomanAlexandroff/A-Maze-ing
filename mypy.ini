[mypy]

# This file sets basic "mypy ." command to act like "mypy . --warn-return-any --warn-unused-ignores
# --ignore-missing-imports --disallow-untyped-defs --check-untyped-defs" command

python_version = 3.10

warn_return_any = True
warn_unused_ignores = True

ignore_missing_imports = True

disallow_untyped_defs = True

check_untyped_defs = True